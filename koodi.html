
<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <title>PlantBuddy</title>

  <link rel="stylesheet" href="tyylit.css">
</head>
<body>
  <div class="app">
    <div class="app-header">
      <div class="menu-icon" onclick="toggleMenu()">≡</div>
      <div class="title">PlantBuddy</div>
      <div class="plant-logo">🌱</div>
    </div>

    <!-- VALIKKO -->
    <div class="menu" id="menu">
      <button onclick="showView('home')">Etusivu</button>
      <button onclick="showView('plants')">Kasvit</button>
      <button onclick="showView('calendar')">Kalenteri</button>
    </div>

    <!-- ETUSIVU -->
    <div id="home" class="view active">
      <h2 style="color:#23452c; margin-bottom:10px; font-size:22px;">Tervetuloa PlantBuddyyn</h2>
      <p style="color:#35523d; font-size:16px;">
        Seuraa kasvien hyvinvointia ja näe milloin on seuraavan kastelun aika.
      </p>
    </div>

    <!-- KASVIT -->
    <div id="plants" class="view">
      <div class="plants">
        <div class="plant-card">
          <div class="plant-top">
            <span>Pate</span>
            <span class="status-dot status-red"></span>
          </div>
          <div class="plant-text">
            Pate on nyt hyvin harmistunut kun et ole kastellut häntä moneen viikkoon
          </div>
        </div>

        <div class="plant-card">
          <div class="plant-top">
            <span>Mansikki</span>
            <span class="status-dot status-yellow"></span>
          </div>
          <div class="plant-text">
            Mansikki on jo hieman janoinen, muistappa kastella
          </div>
        </div>

        <div class="plant-card">
          <div class="plant-top">
            <span>Pekka</span>
            <span class="status-dot status-green"></span>
          </div>
          <div class="plant-text">
            Pekka kukoistaa, hyvää työtä
          </div>
        </div>
      </div>
    </div>

   <div id="calendar" class="view">
  <div class="calendar-container">

    <div class="calendar-header">
  <button onclick="prevMonth()">←</button>
  <span></span>
  <button onclick="nextMonth()">→</button>
</div>

    <div class="calendar-grid" id="calendarGrid"></div>

  </div>
</div>

  <script>

let currentMonth = 3; 
let currentYear = 2026;

const plants = [
  { name: "Heikki", nextWater: 18 },
  { name: "Mansikki", nextWater: 20 },
  { name: "Pekka", nextWater: 25 }
];

function generateCalendar() {
  const grid = document.getElementById("calendarGrid");
  grid.innerHTML = "";

  const date = new Date(currentYear, currentMonth, 1);
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

  let startDay = date.getDay();
  startDay = (startDay === 0) ? 6 : startDay - 1;

  const months = [
    "Tammikuu","Helmikuu","Maaliskuu","Huhtikuu",
    "Toukokuu","Kesäkuu","Heinäkuu","Elokuu",
    "Syyskuu","Lokakuu","Marraskuu","Joulukuu"
  ];

  document.querySelector(".calendar-header span").textContent =
    `${months[currentMonth]} ${currentYear}`;

  const dayNames = ["Ma", "Ti", "Ke", "To", "Pe", "La", "Su"];

  dayNames.forEach(d => {
    const el = document.createElement("div");
    el.className = "day-name";
    el.textContent = d;
    grid.appendChild(el);
  });

  for (let i = 0; i < startDay; i++) {
    const empty = document.createElement("div");
    empty.className = "day empty";
    grid.appendChild(empty);
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const el = document.createElement("div");
    el.className = "day";

    let content = `<strong>${day}</strong>`;

    plants.forEach(p => {
      if (p.nextWater === day) {
        content += `<br>💧 ${p.name}`;
      }
    });

    el.innerHTML = content;
    grid.appendChild(el);
  }
}

function nextMonth() {
  currentMonth++;
  if (currentMonth > 11) {
    currentMonth = 0;
    currentYear++;
  }
  generateCalendar();
}

function prevMonth() {
  currentMonth--;
  if (currentMonth < 0) {
    currentMonth = 11;
    currentYear--;
  }
  generateCalendar();
}

generateCalendar();

function toggleMenu() {
  const menu = document.getElementById("menu");

  if (menu.style.display === "flex") {
    menu.style.display = "none";
  } else {
    menu.style.display = "flex";
  }
}

function showView(viewId) {
  document.querySelectorAll(".view").forEach(v => {
    v.classList.remove("active");
  });

  document.getElementById(viewId).classList.add("active");

  // sulje menu automaattisesti
  document.getElementById("menu").style.display = "none";
}

  </script>
</body>
</html>
